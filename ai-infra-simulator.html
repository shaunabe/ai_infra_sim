<script>
// Diagnostic logging
var _diag = [];
function logDiag(lib, ok) {
  _diag.push({lib:lib, ok:ok});
  var el = document.getElementById('load-status');
  el.className = 'show';
  el.innerHTML = '<b>Load Status:</b><br>' + _diag.map(function(d) {
    return '<span class="'+(d.ok?'ok':'fail')+'">' + (d.ok?'✓':'✗') + ' ' + d.lib + '</span>';

}

  var el = document.getElementById('load-msg');

</script>

function simulateArchitecture(archId, params, geo) {
  const g = geo, p = params;
  let deploymentSpeed, costPerMW, viability, revenuePerMW, hyperscalerFit, riskScore;
  const gridBroken = 1 - p.interconnectImprovement;
  const inferenceDistributed = p.inferenceShift * (1 + p.openSourceAdoption) / 2;
  switch (archId) {
    case "centralized":
      deploymentSpeed = Math.max(2, g.interconnectQueueYears * gridBroken * (1 - p.laborSupplyGrowth));
      costPerMW = 10000 * (1 + p.energyPriceVolatility * 0.3);
      revenuePerMW = 1200 * (1 - p.bubbleBurst * 0.6);
      hyperscalerFit = 0.9 * (1 - inferenceDistributed * 0.3);
      viability = (1 - gridBroken * 0.6) * g.gridReliability * (1 - p.bubbleBurst * 0.7);
      riskScore = gridBroken * 0.4 + p.bubbleBurst * 0.4 + (1 - g.laborAvailability) * 0.2;
      break;
    case "captivePower":
      deploymentSpeed = Math.max(2.5, 6 * (1 - (g.nuclearPipelineMaturity || 0.2) * 0.3) * (1 - (p.captivePowerBuild || 0.25) * 0.25));
      costPerMW = 15000 * (1 - (p.captivePowerBuild || 0.25) * 0.15);
      revenuePerMW = 1400 * (1 - p.bubbleBurst * 0.5);
      hyperscalerFit = 0.95;
      viability = (p.captivePowerBuild || 0.25) * 0.3 + (g.nuclearPipelineMaturity || 0.2) * 0.2 + gridBroken * 0.2 + (1 - p.energyPriceVolatility) * 0.15 + (g.regulatorySpeed || 0.3) * 0.15;
      viability *= (1 - p.bubbleBurst * 0.6);
      riskScore = (1 - (p.captivePowerBuild || 0.25)) * 0.2 + p.bubbleBurst * 0.35 + (1 - (g.nuclearPipelineMaturity || 0.2)) * 0.2 + (1 - (g.regulatorySpeed || 0.3)) * 0.15 + 0.1;
      break;
    case "brownfield":
      var siteAvail = g.brownfieldSiteAvailability || 0.5;
      deploymentSpeed = Math.max(0.8, 2.5 * (1 - siteAvail * 0.3) * (1 - (p.brownfieldConversion || 0.3) * 0.3));
      costPerMW = 4000 * (1 - (p.brownfieldConversion || 0.3) * 0.2) * (1 + (1 - siteAvail) * 0.3);
      revenuePerMW = 1000 * (1 + gridBroken * 0.3) * (1 - p.bubbleBurst * 0.45);
      hyperscalerFit = Math.min(1, 0.8 * (1 + (p.brownfieldConversion || 0.3) * 0.15));
      viability = siteAvail * 0.25 + gridBroken * 0.25 + (p.brownfieldConversion || 0.3) * 0.2 + g.gridReliability * 0.15 + g.fiberPenetration * 0.15;
      viability *= (1 - p.bubbleBurst * 0.35);
      riskScore = (1 - siteAvail) * 0.25 + p.interconnectImprovement * 0.2 + p.bubbleBurst * 0.25 + (1 - g.laborAvailability) * 0.15 + 0.15;
      break;
    case "poweredLand":
      deploymentSpeed = Math.max(0.5, 1.5 * (1 - g.existingSubstationHeadroom * 0.5));
      costPerMW = 800 * (1 + (1 - g.existingSubstationHeadroom) * 0.5);
      revenuePerMW = 700 * (1 + gridBroken * 0.5) * (1 - p.bubbleBurst * 0.3);
      hyperscalerFit = 0.95 * (1 - p.interconnectImprovement * 0.3);
      viability = gridBroken * 0.5 + g.existingSubstationHeadroom * 0.3 + g.fiberPenetration * 0.2;
      viability *= (1 - p.bubbleBurst * 0.25);
      riskScore = p.interconnectImprovement * 0.5 + (1 - g.existingSubstationHeadroom) * 0.3 + p.bubbleBurst * 0.2;
      break;
    case "edgeCloud":
      deploymentSpeed = Math.max(0.3, 1 * (1 - g.solarIrradiance * 0.3));
      costPerMW = 600 * (1 + (1 - g.consumerBroadband) * 0.4);
      revenuePerMW = 500 * (1 + inferenceDistributed * 0.6) * (1 - p.bubbleBurst * 0.2);
      hyperscalerFit = 0.35 * (1 - p.chipSpecialization * 0.3 - p.hyperscalerEdgeBuild * 0.3);
      viability = inferenceDistributed * 0.3 + g.solarIrradiance * 0.25 + (1 - g.gridReliability) * 0.15 + p.openSourceAdoption * 0.2 + (1 - p.appleEdgeLaunch) * 0.1;
      viability *= (1 - p.bubbleBurst * 0.15);
      riskScore = p.hyperscalerEdgeBuild * 0.25 + p.chipSpecialization * 0.2 + p.appleEdgeLaunch * 0.25 + (1 - g.consumerBroadband) * 0.15 + (1 - g.solarIrradiance) * 0.15;
      break;
    case "neoCloud":
      deploymentSpeed = Math.max(1, 2 * (1 - g.gridReliability * 0.3));
      costPerMW = 3000 * (1 + p.energyPriceVolatility * 0.5);
      revenuePerMW = 900 * (1 - p.energyPriceVolatility * 0.3) * (1 - p.bubbleBurst * 0.5);
      hyperscalerFit = 0.5 * (1 - p.chipSpecialization * 0.3);
      viability = 0.5 * g.gridReliability * (1 - p.energyPriceVolatility * 0.4) * (1 - p.bubbleBurst * 0.5);
      riskScore = p.energyPriceVolatility * 0.4 + p.bubbleBurst * 0.3 + (1 - g.gridReliability) * 0.3;
      break;
    case "byoHardware":
      deploymentSpeed = 0.2;
      costPerMW = 50;
      revenuePerMW = 80 * (1 + p.appleEdgeLaunch * 2);
      hyperscalerFit = 0.15 + p.appleEdgeLaunch * 0.4;
      viability = p.appleEdgeLaunch * 0.4 + inferenceDistributed * 0.3 + g.consumerBroadband * 0.2 + p.openSourceAdoption * 0.1;
      viability *= (1 - p.bubbleBurst * 0.1);
      riskScore = (1 - g.consumerBroadband) * 0.3 + (1 - p.appleEdgeLaunch) * 0.4 + 0.3;
      break;
  }
  viability = Math.max(0, Math.min(1, viability));
  riskScore = Math.max(0, Math.min(1, riskScore));
  hyperscalerFit = Math.max(0, Math.min(1, hyperscalerFit));
  return { id: archId, name: ARCHITECTURES[archId].name, color: ARCHITECTURES[archId].color, deploymentYears: Math.round(deploymentSpeed * 10) / 10, capexPerMW: Math.round(costPerMW), revenuePerMW: Math.round(revenuePerMW), viabilityScore: Math.round(viability * 100), hyperscalerAlignment: Math.round(hyperscalerFit * 100), riskScore: Math.round(riskScore * 100), roi: revenuePerMW > 0 && costPerMW > 0 ? Math.round((revenuePerMW / costPerMW) * 100) : 0 };
}

function StackTable({ archId }) {
  const a = ARCHITECTURES[archId];
  const layers = [{name:"Real Estate",key:"realEstate"},{name:"Power Generation",key:"power"},{name:"Interconnect / Fiber",key:"fiber"},{name:"Hardware (GPUs/TPUs)",key:"hardware"},{name:"Orchestration Software",key:"orchestration"}];
  return (
    <div style={{ marginTop: 12 }}>

                      <tr key={layer} style={{ borderBottom:"1px solid #F1F5F9" }}>
                        <td style={{ padding:"8px", fontWeight:600, color:"#475569", textTransform:"capitalize", fontSize:10 }}>{layer==="realEstate"?"Real Estate":layer}</td>
                        {Object.entries(ARCHITECTURES).map(([id,a])=>{const val=a.stackOwnership[layer];const isR=val.includes("RISK")||val.includes("vulnerable");return <td key={id} style={{ padding:"7px 4px", color:isR?"#DC2626":"#475569", fontWeight:isR?600:400, fontSize:8, lineHeight:1.4 }}>{val}</td>;})}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginTop:20 }}>
                {[{id:"poweredLand",name:"Nodiac",color:"#0D9488",desc:"Sells exactly what hyperscalers need. $25M cap / 20% discount SAFE. Key gating: Google TPU deal."},{id:"edgeCloud",name:"Lektra",color:"#D97706",desc:"Owns orchestration (Maestro). Multiple orchestration platforms emerging. Best in sovereign AI / emerging markets."},{id:"brownfield",name:"Brownfield",color:"#78716C",desc:"Existing interconnection is the killer advantage. Limited site inventory is the constraint."}].map(c=>{
                  const v = results.find(r=>r.id===c.id)?.viabilityScore||0;
                  const grade = v>50?"STRONG":v>30?"MODERATE":"WEAK";
                  return (
                    <div key={c.id} style={{ background:`${c.color}10`, borderRadius:12, padding:16, border:`1px solid ${c.color}25` }}>
                      <div style={{ fontFamily:SANS, fontSize:11, fontWeight:700, color:c.color, marginBottom:6 }}>{c.name}: {grade}</div>
                      <div style={{ fontFamily:SANS, fontSize:10, color:"#475569", lineHeight:1.5 }}>{c.desc}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Bottom Panel */}
      <div style={{ flexShrink:0, background:"#0F172A", borderTop:"2px solid #0D9488", transition:"all 0.3s ease" }}>
        <div onClick={()=>setPanelOpen(!panelOpen)} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"8px 20px", cursor:"pointer", userSelect:"none" }}>
          <div style={{ display:"flex", alignItems:"center", gap:12, overflow:"auto" }}>
            <span style={{ fontFamily:SANS, fontSize:11, fontWeight:700, color:"#94A3B8", textTransform:"uppercase", letterSpacing:"0.08em", flexShrink:0 }}>Scenarios</span>
            <div style={{ display:"flex", gap:3 }}>
              {Object.entries(SCENARIO_PRESETS).map(([key,s])=>(
                <button key={key} onClick={e=>{e.stopPropagation();selectScenario(key);if(!panelOpen)setPanelOpen(true);}} style={{ fontFamily:SANS, fontSize:9.5, fontWeight:scenario===key?700:500, padding:"3px 8px", borderRadius:4, border:"none", cursor:"pointer", background:scenario===key?"#0D9488":"rgba(255,255,255,0.06)", color:scenario===key?"white":"#64748B", whiteSpace:"nowrap" }}>{s.shortName}</button>
              ))}
            </div>
          </div>
          <div style={{ fontFamily:MONO, fontSize:14, color:"#64748B", transform:panelOpen?"rotate(180deg)":"rotate(0deg)", transition:"transform 0.2s", flexShrink:0, marginLeft:8 }}>▲</div>
        </div>

        {panelOpen && (
          <div style={{ borderTop:"1px solid #1E293B", maxHeight:PANEL_HEIGHT, overflow:"hidden" }}>
            <div style={{ display:"flex", gap:2, padding:"8px 20px 0" }}>
              {[{id:"scenarios",label:"Scenario Detail"},{id:"params",label:"Tune Parameters"},{id:"grid",label:"Grid Baseline"}].map(t=>(
                <button key={t.id} onClick={()=>setPanelTab(t.id)} style={{ fontFamily:SANS, fontSize:10, fontWeight:panelTab===t.id?700:500, padding:"5px 12px", borderRadius:"6px 6px 0 0", border:"none", cursor:"pointer", background:panelTab===t.id?"#1E293B":"transparent", color:panelTab===t.id?"#E2E8F0":"#64748B" }}>{t.label}</button>
              ))}
            </div>
            <div style={{ background:"#1E293B", padding:"14px 20px", overflowY:"auto", maxHeight:PANEL_HEIGHT-42 }}>
              {panelTab === "scenarios" && (
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(200px, 1fr))", gap:8 }}>
                  {Object.entries(SCENARIO_PRESETS).map(([key,s])=>(
                    <div key={key} onClick={()=>selectScenario(key)} style={{ padding:"10px 12px", borderRadius:8, cursor:"pointer", background:scenario===key?"#0D948818":"rgba(255,255,255,0.03)", border:scenario===key?"1px solid #0D948850":"1px solid #334155" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:3 }}>
                        <div style={{ fontFamily:SANS, fontSize:10.5, fontWeight:700, color:scenario===key?"#0D9488":"#CBD5E1" }}>{s.shortName}</div>
                        <span style={{ fontFamily:MONO, fontSize:9, color:"#64748B" }}>{s.probability}</span>
                      </div>
                      <div style={{ fontFamily:SANS, fontSize:9.5, color:"#94A3B8", lineHeight:1.4 }}>{s.description}</div>
                    </div>
                  ))}
                </div>
              )}
              {panelTab === "params" && (
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"4px 24px" }}>
                  <SliderParam label="Interconnect Queue Fix" value={params.interconnectImprovement} onChange={v=>setParam("interconnectImprovement",v)} hint="0% = 5-8yr queues. 100% = solved." />
                  <SliderParam label="Open Source Adoption" value={params.openSourceAdoption} onChange={v=>setParam("openSourceAdoption",v)} hint="% inference on open-source models" />
                  <SliderParam label="Inference → Edge Shift" value={params.inferenceShift} onChange={v=>setParam("inferenceShift",v)} hint="% inference migrating from centralized" />
                  <SliderParam label="Energy Price Volatility" value={params.energyPriceVolatility} onChange={v=>setParam("energyPriceVolatility",v)} hint="Grid price spike frequency" />
                  <SliderParam label="Labor Supply Growth" value={params.laborSupplyGrowth} onChange={v=>setParam("laborSupplyGrowth",v)} hint="Electrician/lineman workforce" />
                  <SliderParam label="Hyperscaler Edge Build" value={params.hyperscalerEdgeBuild} onChange={v=>setParam("hyperscalerEdgeBuild",v)} hint="Google/MSFT build own distributed" />
                  <SliderParam label="Chip Specialization" value={params.chipSpecialization} onChange={v=>setParam("chipSpecialization",v)} hint="TPU/custom inference chip adoption" />
                  <SliderParam label="Apple Edge Launch" value={params.appleEdgeLaunch} onChange={v=>setParam("appleEdgeLaunch",v)} hint="Apple distributed inference" />
                  <SliderParam label="Bubble Burst" value={params.bubbleBurst} onChange={v=>setParam("bubbleBurst",v)} hint="$400B AI spend as bubble" />
                  <SliderParam label="Brownfield Conversion" value={params.brownfieldConversion||0} onChange={v=>setParam("brownfieldConversion",v)} hint="Rate of coal/gas/industrial site reuse" />
                  <SliderParam label="Captive Power Build" value={params.captivePowerBuild||0} onChange={v=>setParam("captivePowerBuild",v)} hint="Hyperscaler dedicated gen (nuclear/gas/geo)" />
                </div>
              )}
              {panelTab === "grid" && (
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(140px, 1fr))", gap:"8px 20px" }}>
                  {[{l:"Grid Reliability",v:`${Math.round(geo.gridReliability*100)}%`},{l:"Avg Electricity",v:`$${geo.avgElectricityCost}/kWh`},{l:"Solar Irradiance",v:`${Math.round(geo.solarIrradiance*100)}%`},{l:"Interconnect Queue",v:`${geo.interconnectQueueYears} yr`},{l:"Fiber Penetration",v:`${Math.round(geo.fiberPenetration*100)}%`},{l:"Substation Headroom",v:`${Math.round(geo.existingSubstationHeadroom*100)}%`},{l:"Solar Cost",v:`$${geo.solarCostPerWatt}/W`},{l:"Battery Storage",v:`$${geo.batteryStorageCostKwh}/kWh`},{l:"Labor Availability",v:`${Math.round(geo.laborAvailability*100)}%`},{l:"Consumer Broadband",v:`${Math.round(geo.consumerBroadband*100)}%`},{l:"Brownfield Sites",v:`${Math.round((geo.brownfieldSiteAvailability||0.5)*100)}%`},{l:"Nuclear Pipeline",v:`${Math.round((geo.nuclearPipelineMaturity||0.2)*100)}%`}].map(item=>(
                    <div key={item.l} style={{ padding:"6px 0" }}><div style={{ fontFamily:SANS, fontSize:9, fontWeight:600, color:"#64748B", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:2 }}>{item.l}</div><div style={{ fontFamily:MONO, fontSize:14, fontWeight:600, color:"#E2E8F0" }}>{item.v}</div></div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<InfraSimulator />, document.getElementById('root'));
</script>
</body>
</html>
